<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Chart Embed</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/rithmic.css" />
    <script type="importmap">
      {
        "imports": {
          "lightweight-charts": "/vendor/lightweight-charts.mjs"
        }
      }
    </script>
  </head>
  <body class="tv-app--embed">
    <div class="tv-app">
      <div class="tv-workspace tv-workspace--embed">
        <aside id="drawing-toolbar" class="drawing-toolbar" aria-label="Drawing tools"></aside>
        <main class="tv-stage" aria-busy="true">
          <div class="app-loader" id="app-loader" role="status" aria-label="Loading chart">
            <div class="app-loader__spinner" aria-hidden="true"></div>
          </div>
          <div class="tv-chart-wrap">
            <div class="tv-chart-wrap__stage">
              <div class="tv-watermark" aria-hidden="true">
                <span class="tv-watermark__text" id="watermark"></span>
              </div>
              <div id="chart"></div>
              <div class="status-line tv-ohlc" id="ohlc" aria-live="polite"></div>
            </div>
            <footer class="tv-chart-replay-bar" aria-label="Bar replay" hidden>
              <div class="tv-chart-replay-bar__grow"></div>
              <div class="tv-chart-replay-bar__controls" id="chart-replay-toolbar" role="toolbar" aria-label="Bar replay controls"></div>
              <div class="tv-chart-replay-bar__grow"></div>
            </footer>
            <footer class="tv-chart-bottom-bar" aria-label="Chart bottom bar">
              <div class="tv-chart-bottom-bar__grow"></div>
              <div class="tv-chart-bottom-bar__right" id="chart-bottom-toolbar"></div>
            </footer>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script type="module" src="/embed-boot.mjs"></script>
  </body>
</html>
