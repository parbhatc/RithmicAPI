syntax = "proto3";

package rti;

// Order-plant session bootstrap (after picking system + gateway)

message RequestOrderSessionConfig {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  bool should_defer_request = 157750;
}

message ResponseOrderSessionConfig {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  repeated string rp_code = 132766;
}

message RequestLoginInfo {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
}

message ResponseLoginInfo {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  repeated string rp_code = 132766;
  string fcm_id = 154013;
  string ib_id = 154014;
  int32 user_type = 154036;
}

message RequestAccountList {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  string fcm_id = 154013;
  string ib_id = 154014;
  int32 user_type = 154036;
}

message RequestAccountRmsInfo {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  string fcm_id = 154013;
  string ib_id = 154014;
  int32 user_type = 154036;
}

message RequestTradeRoutes {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  bool subscribe_for_updates = 154352;
}

// Mobile / web client metadata (template 100002)
message RequestMobileAppInfo {
  int32 template_id = 154467;
  string client_platform = 158100;
  string app_name = 130002;
  repeated string user_msg = 132760;
}

// Mobile app connect ack (template 100003)
message ResponseMobileAppConnect {
  int32 template_id = 154467;
  string app_name = 130002;
  string client_platform = 158100;
  repeated string rq_handler_rp_code = 132764;
  string app_version = 131804;
  repeated string user_msg = 132760;
}

// Trade route / simulator line (template 311)
message ResponseTradeRoute {
  int32 template_id = 154467;
  string exchange = 110101;
  string trade_route = 112016;
  string status = 131407;
  string fcm_id = 154013;
  string ib_id = 154014;
  int32 route_id = 154689;
  repeated string rp_code = 132766;
}

message RequestShowOrders {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  string fcm_id = 154013;
  string ib_id = 154014;
  string account_id = 154008;
}

message RequestSubscribeForOrderUpdates {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  string fcm_id = 154013;
  string ib_id = 154014;
  string account_id = 154008;
}

message RequestHeartbeat {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
}

message ResponseHeartbeat {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  repeated string rp_code = 132766;
}
