syntax = "proto3";

package rti;

// Ticker push messages (template 152 / 155 / 157) — field numbers from wire captures.

message HighPriceLowPrice {
  int32 template_id = 154467;
  string symbol = 110100;
  string exchange = 110101;
  uint32 presence_bits = 149138;
  uint32 clear_bits = 154571;
  bool is_snapshot = 110121;
  double high_price = 100012;
  double low_price = 100013;
  int32 ssboe = 150100;
  int32 usecs = 150101;
}

message ClosePrice {
  int32 template_id = 154467;
  string symbol = 110100;
  string exchange = 110101;
  uint32 presence_bits = 149138;
  uint32 clear_bits = 154571;
  bool is_snapshot = 110121;
  double close_price = 100021;
  string close_date = 100079;
  int32 ssboe = 150100;
  int32 usecs = 150101;
}

message MarketMode {
  int32 template_id = 154467;
  string symbol = 110100;
  string exchange = 110101;
  bool is_snapshot = 110121;
  string market_mode = 154362;
  int32 ssboe = 150100;
  int32 usecs = 150101;
}
