syntax = "proto3";

package rti;

// Mobile / Lucid app messages.

message RequestSubscribeForUnderlying {
  enum Request {
    REQUEST_UNSPECIFIED = 0;
    SUBSCRIBE = 1;
    UNSUBSCRIBE = 2;
  }

  int32 template_id = 154467;
  repeated string user_msg = 132760;
  string symbol = 110100;
  string exchange = 110101;
  Request request = 100000;
  uint32 update_bits = 154211;
}

message ResponseMarketDataSubscribe {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  repeated string rp_code = 132766;
  string symbol = 110100;
  string exchange = 110101;
}

message RequestMarketDataCredentials {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
}

message ResponseMarketDataCredentials {
  int32 template_id = 154467;
  repeated string user_msg = 132760;
  repeated string rp_code = 132766;
  string user = 131003;
  string password = 130004;
}
